ai:
  provider: anthropic
  default: sonnet
  models:
    sonnet:
      model: claude-sonnet-4-5
      max_tokens: 8096
      provider: anthropic
      base_url: https://dashscope.aliyuncs.com/api/v2/apps/claude-code-proxy
    haiku:
      model: claude-haiku-3-5-20241022
      max_tokens: 4096
      provider: anthropic
      base_url: https://dashscope.aliyuncs.com/api/v2/apps/claude-code-proxy
  tasks:
    parse: haiku
    heal: sonnet
    dev_frontend: sonnet
    dev_backend: sonnet
prd_parser:
  retry_count: 3
  retry_delay: 2
  min_interaction_steps: 2
test_generator:
  idempotent: true
  auto_archive: true
heal:
  max_iterations: 3
  wall_clock_sec: 900
  token_limit_per_run: 50000
  max_tokens_per_prd_24h: 200000
metadata:
  meta_db_path: ./tests/generated/{project_id}/meta.db
typeui:
  skill_path: ./design/SKILL.md
  slug: clean
