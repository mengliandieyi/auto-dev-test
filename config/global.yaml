# 全局配置（规范源：docs/TECH-DESIGN.md §11.3）
# required_sections 由 validator.py 实现「三章 + 页面交互/使用流程 二选一」

ai:
  provider: anthropic
  model: claude-sonnet-4-5
  max_tokens: 8096

prd_parser:
  retry_count: 3
  retry_delay: 2
  min_interaction_steps: 2

test_generator:
  idempotent: true
  auto_archive: true

heal:
  max_iterations: 3
  wall_clock_sec: 900
  token_limit_per_run: 50000
  max_tokens_per_prd_24h: 200000

metadata:
  meta_db_path: ./tests/generated/{project_id}/meta.db

typeui:
  skill_path: ./design/SKILL.md
  slug: clean
