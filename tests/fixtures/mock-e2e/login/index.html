<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>登录</title>
</head>
<body>
  <form id="form">
    <input data-testid="username-input" id="user" type="email" />
    <input data-testid="password-input" id="pass" type="password" />
    <button data-testid="login-btn" type="submit">登录</button>
    <div data-testid="error-message" id="err" style="display:none;color:red"></div>
  </form>
  <script>
    const VALID_USER = 'test@example.com';
    const VALID_PASS = 'Test1234!';
    document.getElementById('form').addEventListener('submit', function (e) {
      e.preventDefault();
      const u = document.getElementById('user').value;
      const p = document.getElementById('pass').value;
      const err = document.getElementById('err');
      if (u === VALID_USER && p === VALID_PASS) {
        window.location.href = '/dashboard/';
        return;
      }
      err.textContent = '账号或密码错误';
      err.style.display = 'block';
      document.getElementById('pass').value = '';
    });
  </script>
</body>
</html>
